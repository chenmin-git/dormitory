server:
  port: 8088
  servlet:
    context-path: /api

spring:
  application:
    name: dormitory-backend
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:dormitory}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.dormitory.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # 生产环境请用环境变量覆盖：JWT_SECRET
  secret: ${JWT_SECRET:dormitory-graduation-project-secret-key-2026-change-me}
  # token 有效期（毫秒），默认 7 天
  expire: 604800000
  header: Authorization
  prefix: "Bearer "

# 讯飞星火大模型配置（OpenAI 兼容 HTTP 接口）
spark:
  url: https://spark-api-open.xf-yun.com/v1/chat/completions
  # APIPassword = APIKey:APISecret（讯飞控制台获取），必须通过环境变量 SPARK_API_PASSWORD 配置
  api-password: ${SPARK_API_PASSWORD:}
  # 模型版本：generalv3=Pro  generalv3.5=Max  lite=Lite  4.0Ultra
  model: ${SPARK_MODEL:generalv3}
  # 单次请求超时（秒）
  timeout: 30

# Knife4j 文档
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.dormitory: debug
